<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convierte CLP/USD</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; background-color: #f3f4f6; }
        .app-card { max-width: 400px; margin: 2rem auto; background: white; padding: 2rem; border-radius: 1rem; shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="app-card shadow-xl">
        <h1 class="text-2xl font-bold text-center mb-6 text-blue-600">Conversor Pro</h1>
        
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700">Monto a convertir</label>
            <input type="number" id="amount" class="w-full p-3 border rounded-lg mt-1" placeholder="Ej: 1000">
        </div>

        <button id="toggleBtn" class="w-full py-2 mb-4 bg-gray-200 rounded-lg font-semibold">
            Modo: Pesos a Dólar
        </button>

        <button onclick="convertir()" class="w-full py-3 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 transition">
            Convertir Ahora
        </button>

        <div class="mt-8 p-4 bg-blue-50 rounded-lg text-center">
            <p class="text-sm text-gray-500">Resultado:</p>
            <p id="result" class="text-3xl font-bold text-blue-800">$ 0.00</p>
        </div>
        
        <p id="rateInfo" class="text-xs text-center mt-4 text-gray-400">Obteniendo tasa real...</p>
    </div>

    <script>
        let isCLPtoUSD = true;
        let valorDolar = 0;

        // Registro del Service Worker para que sea instalable
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        // Obtener el valor del dólar desde la API
        async function getTasa() {
            try {
                const response = await fetch('https://mindicador.cl/api/dolar');
                const data = await response.json();
                valorDolar = data.serie[0].valor;
                document.getElementById('rateInfo').innerText = `Tasa actual: $${valorDolar} CLP`;
            } catch (error) {
                document.getElementById('rateInfo').innerText = "Error al conectar con la API";
            }
        }

        document.getElementById('toggleBtn').onclick = function() {
            isCLPtoUSD = !isCLPtoUSD;
            this.innerText = isCLPtoUSD ? "Modo: Pesos a Dólar" : "Modo: Dólar a Pesos";
        };

        function convertir() {
            const val = parseFloat(document.getElementById('amount').value);
            if (isNaN(val) || valorDolar === 0) return;
            
            const res = isCLPtoUSD ? (val / valorDolar) : (val * valorDolar);
            document.getElementById('result').innerText = isCLPtoUSD ? `$ ${res.toFixed(2)} USD` : `$ ${Math.round(res)} CLP`;
        }

        getTasa();
    </script>
</body>
</html>
