<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor CLP/USD Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; }
        .app-container { max-width: 450px; margin: 2rem auto; }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="p-4">
    <div class="app-container bg-white rounded-3xl shadow-2xl overflow-hidden">
        <div class="bg-blue-600 p-6 text-white text-center">
            <h1 class="text-xl font-bold uppercase tracking-wider">Conversor de Divisas</h1>
            <p id="rateInfo" class="text-blue-100 text-sm mt-2">Cargando tasa del día...</p>
        </div>

        <div class="p-6">
            <button id="toggleBtn" onclick="cambiarModo()" class="w-full flex items-center justify-center gap-2 py-2 mb-6 bg-blue-50 text-blue-700 rounded-xl font-semibold border border-blue-100 hover:bg-blue-100 transition">
                <span id="modeText">Modo: Pesos a Dólar</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" />
                </svg>
            </button>

            <div class="mb-6">
                <label class="block text-xs font-bold text-gray-400 uppercase mb-1 ml-1">Monto a convertir</label>
                <input type="number" id="amount" 
                       class="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-2xl text-2xl font-semibold focus:border-blue-500 focus:outline-none transition" 
                       placeholder="0">
            </div>

            <button onclick="convertir()" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold text-lg shadow-lg shadow-blue-200 hover:bg-blue-700 active:scale-95 transition-all">
                Convertir
            </button>

            <button onclick="limpiar()" class="w-full py-2 mt-3 text-gray-400 font-medium hover:text-gray-600 transition">
                Limpiar campos
            </button>

            <div class="mt-8 p-6 bg-gray-50 rounded-3xl border border-gray-100 text-center">
                <p class="text-xs font-bold text-gray-400 uppercase mb-2">Resultado Final</p>
                <p id="result" class="text-4xl font-black text-gray-800">$ 0</p>
            </div>
        </div>
        
        <div class="p-4 text-center">
            <p class="text-[10px] text-gray-300 italic">Desarrollado con estándares de industria 2026</p>
        </div>
    </div>

    <script>
        let isCLPtoUSD = true;
        let valorDolar = 0;

        // Registro de Service Worker para PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        // Obtener tasa real desde Mindicador.cl
        async function getTasa() {
            try {
                const response = await fetch('https://mindicador.cl/api/dolar');
                const data = await response.json();
                valorDolar = data.serie[0].valor;
                document.getElementById('rateInfo').innerText = `Tasa actual: $${valorDolar.toLocaleString('es-CL')} CLP`;
            } catch (error) {
                document.getElementById('rateInfo').innerText = "Error al conectar con la API";
                console.error("Error API:", error);
            }
        }

        function cambiarModo() {
            isCLPtoUSD = !isCLPtoUSD;
            document.getElementById('modeText').innerText = isCLPtoUSD ? "Modo: Pesos a Dólar" : "Modo: Dólar a Pesos";
            limpiar();
        }

        function limpiar() {
            document.getElementById('amount').value = "";
            document.getElementById('result').innerText = "$ 0";
            document.getElementById('amount').focus();
        }

        function convertir() {
            const val = parseFloat(document.getElementById('amount').value);
            if (isNaN(val) || valorDolar === 0) return;
            
            const res = isCLPtoUSD ? (val / valorDolar) : (val * valorDolar);

            // Formateadores Profesionales (Norma es-CL: punto para miles, coma para decimales)
            const formatterUSD = new Intl.NumberFormat('es-CL', {
                style: 'currency',
                currency: 'USD',
                minimumFractionDigits: 2
            });

            const formatterCLP = new Intl.NumberFormat('es-CL', {
                style: 'currency',
                currency: 'CLP',
                minimumFractionDigits: 0
            });

            if (isCLPtoUSD) {
                document.getElementById('result').innerText = formatterUSD.format(res);
            } else {
                document.getElementById('result').innerText = formatterCLP.format(res);
            }
        }

        // Llamada inicial
        getTasa();
    </script>
</body>
</html>
